<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador Perfil WhatsApp</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Generador Foto Perfil WhatsApp</h1>

<div class="formulario">
    <input type="text" id="materiaInput" placeholder="Nombre de la Materia">
    <input type="text" id="siglaInput" placeholder="Sigla (Ej: INF-110)">
    <input type="text" id="grupoInput" placeholder="Grupo (Ej: SA-VI)">
    <input type="text" id="gestionInput" placeholder="Gestión (Ej: 1/2026)">
    <input type="text" id="extraInput" placeholder="Texto Opcional">
    
    <button onclick="generarImagen()">Generar</button>
    <button onclick="descargarImagen()">Descargar</button>
</div>

<div class="preview">
    <canvas id="canvas" width="1080" height="1080"></canvas>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
